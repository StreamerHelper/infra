# 应用服务: Backend, Frontend, Nginx
# 使用: ./bin/control app up
# 前置条件: infra 服务必须已启动

services:
  # Backend Application
  backend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-umuoy1}/${IMAGE_PREFIX:-streamerhelper}-backend:${BACKEND_VERSION:-latest}
    container_name: streamer-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # App
      APP_KEYS: ${APP_KEYS:-streamer-helper-secret-key}
      # Database
      TYPEORM_HOST: postgres
      TYPEORM_PORT: 5432
      TYPEORM_USERNAME: ${TYPEORM_USERNAME:-postgres}
      TYPEORM_PASSWORD: ${TYPEORM_PASSWORD:-postgres}
      TYPEORM_DATABASE: ${TYPEORM_DATABASE:-streamerhelper}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # S3/MinIO
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-streamerhelper-archive}
    volumes:
      - ${CONFIG_DIR:-~/.streamer-helper}/settings.json:/app/config/settings.json:ro
      - backend_logs:/app/logs
      - backend_temp:/app/temp
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7001"]
      interval: 10s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - streamer-network

  # Frontend Application
  frontend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-umuoy1}/${IMAGE_PREFIX:-streamerhelper}-frontend:${FRONTEND_VERSION:-latest}
    container_name: streamer-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - streamer-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: streamer-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - streamer-network

networks:
  streamer-network:
    external: true

volumes:
  backend_logs:
  backend_temp:
