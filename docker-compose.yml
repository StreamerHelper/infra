services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: streamer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TYPEORM_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${TYPEORM_PASSWORD:-postgres}
      POSTGRES_DB: ${TYPEORM_DATABASE:-streamerhelper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TYPEORM_USERNAME:-postgres} -d ${TYPEORM_DATABASE:-streamerhelper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamer-network

  # Redis Cache/Queue
  redis:
    image: redis:7-alpine
    container_name: streamer-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamer-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: streamer-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - streamer-network

  # Backend Application
  backend:
    build:
      context: ../StreamerHelper
      dockerfile: ../infra/Dockerfile.backend
    container_name: streamer-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_KEYS: ${APP_KEYS:-streamer-helper-secret-key}
      # Database
      TYPEORM_HOST: postgres
      TYPEORM_PORT: 5432
      TYPEORM_USERNAME: ${TYPEORM_USERNAME:-postgres}
      TYPEORM_PASSWORD: ${TYPEORM_PASSWORD:-postgres}
      TYPEORM_DATABASE: ${TYPEORM_DATABASE:-streamerhelper}
      TYPEORM_SSL: ${TYPEORM_SSL:-false}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      # S3/MinIO
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-streamerhelper-archive}
    volumes:
      - backend_logs:/app/logs
      - backend_temp:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:7001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - streamer-network

  # Frontend Application
  frontend:
    build:
      context: ../StreamerHelper-FE
      dockerfile: ../infra/Dockerfile.frontend
    container_name: streamer-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:7001
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - streamer-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: streamer-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - streamer-network

networks:
  streamer-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_logs:
  backend_temp:
  nginx_logs:
