# 基础设施服务: PostgreSQL, Redis, MinIO
# 使用: ./bin/control infra up

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: streamer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TYPEORM_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${TYPEORM_PASSWORD:-postgres}
      POSTGRES_DB: ${TYPEORM_DATABASE:-streamerhelper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TYPEORM_USERNAME:-postgres} -d ${TYPEORM_DATABASE:-streamerhelper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamer-network

  # Redis Cache/Queue
  redis:
    image: redis:7-alpine
    container_name: streamer-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamer-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: streamer-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - streamer-network

networks:
  streamer-network:
    name: streamer-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
