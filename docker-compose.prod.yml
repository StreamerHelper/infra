services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: streamer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TYPEORM_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${TYPEORM_PASSWORD:-postgres}
      POSTGRES_DB: ${TYPEORM_DATABASE:-livestream}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TYPEORM_USERNAME:-postgres} -d ${TYPEORM_DATABASE:-livestream}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamer-network

  # Redis Cache/Queue
  redis:
    image: redis:7-alpine
    container_name: streamer-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamer-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: streamer-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - streamer-network

  # Backend Application
  backend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-umuoy1}/${IMAGE_PREFIX:-streamerhelper}-backend:${BACKEND_VERSION:-latest}
    container_name: streamer-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    volumes:
      # 挂载配置文件
      - ${CONFIG_FILE:-~/.streamer-helper/config.yaml}:/app/config/config.yaml:ro
      - backend_logs:/app/logs
      - backend_temp:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7001"]
      interval: 10s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - streamer-network

  # Frontend Application
  frontend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-umuoy1}/${IMAGE_PREFIX:-streamerhelper}-frontend:${FRONTEND_VERSION:-latest}
    container_name: streamer-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - streamer-network

  # Nginx Reverse Proxy
  nginx:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-umuoy1}/${IMAGE_PREFIX:-streamerhelper}-nginx:${NGINX_VERSION:-latest}
    container_name: streamer-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - frontend
      - backend
    networks:
      - streamer-network

networks:
  streamer-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_logs:
  backend_temp:
